version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sportcore_postgres
    environment:
      POSTGRES_DB: sportcore
      POSTGRES_USER: sportcore
      POSTGRES_PASSWORD: sportcore123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sportcore_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportcore"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Message Broker)
  redis:
    image: redis:7-alpine
    container_name: sportcore_redis
    ports:
      - "6379:6379"
    networks:
      - sportcore_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django + React (Unified Service)
  django:
    build:
      context: ./sportcore
      dockerfile: Dockerfile
    container_name: sportcore_django
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./sportcore:/app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: sportcore
      DB_USER: sportcore
      DB_PASSWORD: sportcore123
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,nginx
      DEBUG: 'True'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sportcore_network

  # Celery Worker
  celery_worker:
    build:
      context: ./sportcore
      dockerfile: Dockerfile
    container_name: sportcore_celery_worker
    command: celery -A config worker -l info
    volumes:
      - ./sportcore:/app
    environment:
      DB_HOST: postgres
      DB_NAME: sportcore
      DB_USER: sportcore
      DB_PASSWORD: sportcore123
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEBUG: 'True'
    depends_on:
      - postgres
      - redis
      - django
    networks:
      - sportcore_network

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./sportcore
      dockerfile: Dockerfile
    container_name: sportcore_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./sportcore:/app
    environment:
      DB_HOST: postgres
      DB_NAME: sportcore
      DB_USER: sportcore
      DB_PASSWORD: sportcore123
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEBUG: 'True'
    depends_on:
      - postgres
      - redis
      - django
    networks:
      - sportcore_network

  # Flask Microservice - Productos
  productos:
    build:
      context: ./microservicios/productos
      dockerfile: Dockerfile
    container_name: sportcore_productos
    command: python app.py
    volumes:
      - ./microservicios/productos:/app
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql://sportcore:sportcore123@postgres:5432/sportcore
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sportcore_network

  # Flask Microservice - Pedidos
  pedidos:
    build:
      context: ./microservicios/pedidos
      dockerfile: Dockerfile
    container_name: sportcore_pedidos
    command: python app.py
    volumes:
      - ./microservicios/pedidos:/app
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: postgresql://sportcore:sportcore123@postgres:5432/sportcore
      PRODUCTOS_SERVICE_URL: http://productos:5001
    depends_on:
      postgres:
        condition: service_healthy
      productos:
        condition: service_started
    networks:
      - sportcore_network

  # Nginx API Gateway
  nginx:
    image: nginx:alpine
    container_name: sportcore_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - django
      - productos
      - pedidos
    networks:
      - sportcore_network

volumes:
  postgres_data:

networks:
  sportcore_network:
    driver: bridge
